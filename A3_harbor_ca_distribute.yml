---
# =================================================================
# A3_harbor_ca_distribute.yml - Harbor CA 인증서 전체 노드 배포
#
# [실행 타이밍] phase1_infra_base.yml 실행 전 (K8s 불필요)
#
# 동작:
#   1. Harbor CA를 모든 노드 시스템 신뢰 저장소에 등록
#   2. bastion/monitoring /etc/hosts 등록
#   3. containerd에 Harbor CA + robot auth 등록 (K8s 노드)
# =================================================================

# ---------------------------------------------------------------
# PLAY 1. Harbor CA 인증서 fetch (Harbor 서버에서)
# ---------------------------------------------------------------
- name: "Harbor CA 인증서 bastion으로 fetch"
  hosts: harbor
  become: yes
  gather_facts: false
  vars:
    harbor_cert_dir: "/etc/harbor/certs"
  tasks:
    - name: "ca.crt 존재 여부 확인"
      ansible.builtin.stat:
        path: "{{ harbor_cert_dir }}/ca.crt"
      register: ca_file

    - name: "Harbor CA 인증서 bastion으로 가져오기 (ca.crt)"
      ansible.builtin.fetch:
        src: "{{ harbor_cert_dir }}/ca.crt"
        dest: /tmp/harbor-ca.crt
        flat: yes
      when: ca_file.stat.exists

    - name: "Harbor CA 인증서 bastion으로 가져오기 (harbor.crt fallback)"
      ansible.builtin.fetch:
        src: "{{ harbor_cert_dir }}/harbor.crt"
        dest: /tmp/harbor-ca.crt
        flat: yes
      when: not ca_file.stat.exists

# ---------------------------------------------------------------
# PLAY 2. 전체 노드 시스템 CA 등록 (K8s + LB + bastion + monitoring)
# ---------------------------------------------------------------
- name: "Harbor CA 시스템 신뢰 등록 (전체 노드)"
  hosts: all
  become: yes
  gather_facts: false
  tasks:
    - name: "Harbor CA 시스템 신뢰 등록"
      ansible.builtin.copy:
        src: /tmp/harbor-ca.crt
        dest: /usr/local/share/ca-certificates/harbor.crt
        mode: "0644"

    - name: "CA 인증서 적용"
      ansible.builtin.shell: update-ca-certificates
      changed_when: true

    - name: "harbor.miso.local /etc/hosts 등록"
      ansible.builtin.lineinfile:
        path: /etc/hosts
        regexp: "{{ harbor_domain }}$"
        line: "{{ hostvars[groups['harbor'][0]]['ansible_host'] }} {{ harbor_domain }}"
        state: present

# ---------------------------------------------------------------
# PLAY 3. bastion /etc/hosts 도메인 등록
# ---------------------------------------------------------------
- name: "Bastion + Monitoring /etc/hosts 도메인 등록"
  hosts: bastion:monitoring
  become: yes
  gather_facts: false
  vars:
    monitor_ip: "{{ hostvars[groups['monitoring'][0]]['ansible_host'] }}"
  tasks:
    - name: "monitoring 도메인 /etc/hosts 등록"
      ansible.builtin.lineinfile:
        path: /etc/hosts
        regexp: "{{ item }}$"
        line: "{{ monitor_ip }} {{ item }}"
        state: present
      loop:
        - "{{ monitor_domain }}"
        - "{{ prometheus_domain }}"
        - "{{ alertmanager_domain }}"
        - "{{ dashboard_domain }}"
        - "{{ minio_console_domain }}"

    - name: "Docker daemon Harbor CA 등록 (monitoring 서버용)"
      ansible.builtin.file:
        path: /etc/docker/certs.d/{{ harbor_domain }}
        state: directory
        mode: "0755"
      when: inventory_hostname in groups['monitoring']

    - name: "Docker daemon에 Harbor CA 복사 (monitoring 서버용)"
      ansible.builtin.copy:
        src: /tmp/harbor-ca.crt
        dest: /etc/docker/certs.d/{{ harbor_domain }}/ca.crt
        mode: "0644"
      when: inventory_hostname in groups['monitoring']
      notify: Restart docker

  handlers:
    - name: Restart docker
      ansible.builtin.systemd:
        name: docker
        state: restarted
      ignore_errors: yes

# ---------------------------------------------------------------
# PLAY 4. K8s 노드 containerd Harbor CA + robot auth 등록
# (03_k8s_masters.yml의 hosts.toml과 일관성 유지)
# ---------------------------------------------------------------
- name: "Harbor CA containerd 등록 (K8s 노드)"
  hosts: k8s
  become: yes
  gather_facts: false
  tasks:
    - name: "containerd certs.d/harbor 디렉토리 생성"
      ansible.builtin.file:
        path: "/etc/containerd/certs.d/{{ harbor_domain }}"
        state: directory
        mode: "0755"

    - name: "containerd Harbor hosts.toml 등록 (CA + robot auth)"
      ansible.builtin.copy:
        dest: "/etc/containerd/certs.d/{{ harbor_domain }}/hosts.toml"
        mode: "0600"
        content: |
          server = "https://{{ harbor_domain }}"
          [host."https://{{ harbor_domain }}"]
            capabilities = ["pull", "resolve"]
            ca = "/usr/local/share/ca-certificates/harbor.crt"
          [host."https://{{ harbor_domain }}".header]
            Authorization = ["Basic {{ (harbor_robot_user + ':' + harbor_robot_pass) | b64encode }}"]
      notify: Restart containerd

  handlers:
    - name: Restart containerd
      ansible.builtin.systemd:
        name: containerd
        state: restarted
      ignore_errors: yes

# ---------------------------------------------------------------
# PLAY 5. 완료 안내
# ---------------------------------------------------------------
- name: "완료 안내"
  hosts: localhost
  gather_facts: false
  tasks:
    - name: "완료"
      ansible.builtin.debug:
        msg:
          - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          - " Harbor CA 배포 완료"
          - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          - " - 전체 노드 시스템 CA 등록 완료"
          - " - containerd Harbor CA + robot auth 등록 완료"
          - " - /etc/hosts 도메인 등록 완료"
          - ""
          - " 다음 단계: phase1_infra_base.yml → reboot_all.yml"
          - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"