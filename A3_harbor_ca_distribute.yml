---
# =================================================================
# A3_harbor_ca_distribute.yml - Harbor CA 인증서 K8s 노드 배포
#
# [실행 타이밍] K8s 클러스터 구성(phase1~2) 완료 후 실행
#
# 실행: ansible-playbook -i ../hosts.ini A3_harbor_ca_distribute.yml
#
# 동작:
#   1. K8s 전체 노드에 Harbor CA 시스템 신뢰 등록
#   2. K8s 노드 containerd에 Harbor 인증서 등록
#   3. CoreDNS에 harbor.miso.local 등록
# =================================================================

# ---------------------------------------------------------------
# PLAY 1. Harbor CA 인증서 fetch (Harbor 서버에서)
# ---------------------------------------------------------------
- name: "Harbor CA 인증서 bastion으로 fetch"
  hosts: harbor
  become: yes
  gather_facts: false
  vars:
    harbor_cert_dir: "/etc/harbor/certs"
  tasks:
    - name: "ca.crt 존재 여부 확인"
      ansible.builtin.stat:
        path: "{{ harbor_cert_dir }}/ca.crt"
      register: ca_file

    - name: "Harbor CA 인증서 bastion으로 가져오기 (ca.crt)"
      ansible.builtin.fetch:
        src: "{{ harbor_cert_dir }}/ca.crt"
        dest: /tmp/harbor-ca.crt
        flat: yes
      when: ca_file.stat.exists

    - name: "Harbor CA 인증서 bastion으로 가져오기 (harbor.crt fallback)"
      ansible.builtin.fetch:
        src: "{{ harbor_cert_dir }}/harbor.crt"
        dest: /tmp/harbor-ca.crt
        flat: yes
      when: not ca_file.stat.exists

# ---------------------------------------------------------------
# PLAY 2. 전체 K8s 노드 + LB 시스템 CA 등록 + DNS 설정
# ---------------------------------------------------------------
- name: "Harbor CA 시스템 신뢰 등록 (K8s 노드 + LB)"
  hosts: k8s:lb
  become: yes
  gather_facts: false
  tasks:
    - name: "Harbor CA 시스템 신뢰 등록"
      ansible.builtin.copy:
        src: /tmp/harbor-ca.crt
        dest: /usr/local/share/ca-certificates/harbor.crt
        mode: "0644"

    - name: "CA 인증서 적용"
      ansible.builtin.shell: update-ca-certificates
      changed_when: true

    - name: "systemd-resolved conf 디렉토리 생성"
      ansible.builtin.file:
        path: /etc/systemd/resolved.conf.d
        state: directory
        mode: "0755"

    - name: "miso.local DNS → CoreDNS 라우팅 설정"
      ansible.builtin.copy:
        dest: /etc/systemd/resolved.conf.d/miso-local.conf
        mode: "0644"
        content: |
          [Resolve]
          DNS=10.96.0.10
          Domains=~miso.local
      notify: Restart systemd-resolved

  handlers:
    - name: Restart systemd-resolved
      ansible.builtin.systemd:
        name: systemd-resolved
        state: restarted

# ---------------------------------------------------------------
# PLAY 2-b. Bastion /etc/hosts 등록 (ClusterIP 직접 접근 불가)
# ---------------------------------------------------------------
- name: "Bastion /etc/hosts에 miso.local 도메인 등록"
  hosts: bastion
  become: yes
  gather_facts: false
  vars:
    harbor_ip: "10.1.5.10"
    monitor_ip: "10.1.5.100"
  tasks:
    - name: "Harbor CA 시스템 신뢰 등록"
      ansible.builtin.copy:
        src: /tmp/harbor-ca.crt
        dest: /usr/local/share/ca-certificates/harbor.crt
        mode: "0644"

    - name: "CA 인증서 적용"
      ansible.builtin.shell: update-ca-certificates
      changed_when: true

    - name: "harbor.miso.local /etc/hosts 등록"
      ansible.builtin.lineinfile:
        path: /etc/hosts
        line: "{{ harbor_ip }} harbor.miso.local"
        state: present

    - name: "monitoring 도메인 /etc/hosts 등록"
      ansible.builtin.lineinfile:
        path: /etc/hosts
        line: "{{ monitor_ip }} {{ item }}"
        state: present
      loop:
        - monitor.miso.local
        - prometheus.miso.local
        - alertmanager.miso.local
        - dashboard.miso.local
        - s3console.miso.local

# ---------------------------------------------------------------
# PLAY 3. K8s 노드 containerd 인증서 등록
# ---------------------------------------------------------------
- name: "Harbor CA containerd 등록 (K8s 노드)"
  hosts: k8s
  become: yes
  gather_facts: false
  vars:
    harbor_hostname: "harbor.miso.local"
  tasks:
    - name: "containerd certs.d 디렉토리 생성"
      ansible.builtin.file:
        path: "/etc/containerd/certs.d/{{ harbor_hostname }}"
        state: directory
        mode: "0755"

    - name: "containerd에 Harbor 인증서 등록"
      ansible.builtin.copy:
        dest: "/etc/containerd/certs.d/{{ harbor_hostname }}/hosts.toml"
        mode: "0644"
        content: |
          server = "https://{{ harbor_hostname }}"

          [host."https://{{ harbor_hostname }}"]
            ca = "/usr/local/share/ca-certificates/harbor.crt"
      notify: Restart containerd

  handlers:
    - name: Restart containerd
      ansible.builtin.systemd:
        name: containerd
        state: restarted
      ignore_errors: yes

# ---------------------------------------------------------------
# PLAY 3-b. K8s imagePullSecret 생성 (miso 프로젝트 private)
# ---------------------------------------------------------------
- name: "Harbor imagePullSecret 생성"
  hosts: bastion
  become: no
  gather_facts: false
  environment:
    KUBECONFIG: "{{ lookup('env', 'HOME') }}/.kube/config"
  vars:
    harbor_user: "admin"
    harbor_password: "Harbor12345"
    harbor_server: "harbor.miso.local"
  tasks:
    - name: "harbor-registry-secret 존재 여부 확인"
      ansible.builtin.shell: |
        kubectl get secret harbor-registry-secret -n default 2>/dev/null | wc -l
      register: secret_check
      changed_when: false

    - name: "harbor-registry-secret 생성"
      ansible.builtin.shell: |
        kubectl create secret docker-registry harbor-registry-secret           --docker-server={{ harbor_server }}           --docker-username={{ harbor_user }}           --docker-password={{ harbor_password }}           -n default
      when: secret_check.stdout | int == 0

    - name: "모든 네임스페이스에 secret 복사 (monitoring, argocd 등)"
      ansible.builtin.shell: |
        for ns in monitoring argocd cert-manager; do
          kubectl get ns $ns 2>/dev/null || continue
          kubectl get secret harbor-registry-secret -n $ns 2>/dev/null && continue
          kubectl get secret harbor-registry-secret -n default -o yaml | \
            sed "s/namespace: default/namespace: $ns/" | \
            kubectl apply -f -
        done
      changed_when: true

    - name: "default ServiceAccount에 imagePullSecrets 등록 (모든 네임스페이스 자동 적용)"
      ansible.builtin.shell: |
        for ns in default monitoring argocd cert-manager; do
          kubectl get ns $ns 2>/dev/null || continue
          kubectl patch serviceaccount default -n $ns \
            -p '{"imagePullSecrets":[{"name":"harbor-registry-secret"}]}'
        done
      changed_when: true

# ---------------------------------------------------------------
# PLAY 4. CoreDNS에 harbor.miso.local 등록
# ---------------------------------------------------------------
- name: "CoreDNS harbor.miso.local 등록"
  hosts: bastion
  become: no
  gather_facts: false
  environment:
    KUBECONFIG: "{{ lookup('env', 'HOME') }}/.kube/config"
  tasks:
    - name: "harbor.miso.local 이미 등록됐는지 확인"
      ansible.builtin.shell: |
        kubectl get configmap coredns -n kube-system \
          -o jsonpath='{.data.Corefile}' | grep -c "harbor.miso.local" || true
      register: harbor_dns_check
      changed_when: false

    - name: "CoreDNS hosts 블록에 harbor 추가"
      ansible.builtin.shell: |
        # 기존 hosts 블록이 있으면 그 안에 항목 추가, 없으면 새로 생성
        COREFILE=$(kubectl get configmap coredns -n kube-system -o jsonpath='{.data.Corefile}')
        if echo "$COREFILE" | grep -q "hosts {"; then
          # 기존 hosts 블록의 fallthrough 앞에 harbor 항목 삽입
          kubectl get configmap coredns -n kube-system -o json | \
          sed 's/      fallthrough/      10.1.5.10 harbor.miso.local\n      fallthrough/' | \
          kubectl apply -f -
        else
          # hosts 블록이 없으면 ready 다음에 새 블록 생성
          kubectl get configmap coredns -n kube-system -o json | \
          sed 's/    ready/    ready\n    hosts {\n      10.1.5.10 harbor.miso.local\n      fallthrough\n    }/' | \
          kubectl apply -f -
        fi
      when: harbor_dns_check.stdout == "0"
      register: dns_update

    - name: "CoreDNS 롤링 재시작"
      ansible.builtin.shell: |
        kubectl rollout restart deployment coredns -n kube-system
        kubectl rollout status deployment coredns -n kube-system --timeout=60s
      when: dns_update is changed
      changed_when: true

    - name: "harbor.miso.local DNS 확인"
      ansible.builtin.shell: |
        nslookup harbor.miso.local 2>/dev/null || true
      register: dns_check
      changed_when: false
      failed_when: false

    - name: "DNS 결과 출력"
      ansible.builtin.debug:
        msg: "{{ dns_check.stdout_lines }}"

    - name: "완료 안내"
      ansible.builtin.debug:
        msg:
          - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          - " Harbor CA 배포 완료"
          - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          - " - K8s 전체 노드 시스템 CA 등록 완료"
          - " - containerd Harbor 인증서 등록 완료"
          - " - CoreDNS harbor.miso.local 등록 완료"
          - ""
          - " 다음 단계:"
          - "   ansible-playbook -i hosts.ini phase4_infra_services.yml"
          - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"