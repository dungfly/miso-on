---
# =================================================================
# PHASE 5 - 데이터 서비스
#
# 실행: ansible-playbook -i hosts.ini phase5_data_services.yml
#
# 개별 옵션:
#   MinIO 재설치   : ansible-playbook -i hosts.ini 09_minio_setup.yml -e force_reinstall=true
#   PG 제거(PVC유지): ansible-playbook -i hosts.ini 13_postgres_cluster.yml -e pg_action=remove
#   PG 완전삭제    : ansible-playbook -i hosts.ini 13_postgres_cluster.yml -e pg_action=purge
#   Redis 재설치   : ansible-playbook -i hosts.ini 14_redis_setup.yml -e force_reinstall=true
#   Redis 제거     : ansible-playbook -i hosts.ini 14_redis_setup.yml -e redis_action=remove
#   OS 재설치      : ansible-playbook -i hosts.ini 15_opensrarch_setup.yml -e force_reinstall=true
#   OS 제거        : ansible-playbook -i hosts.ini 15_opensrarch_setup.yml -e os_action=remove
# =================================================================
- import_playbook: 8.5_coredns_setup.yml
- import_playbook: 09_minio_setup.yml
- import_playbook: 12_cnpg_install.yml
- import_playbook: 13_postgres_cluster.yml
- import_playbook: 13.5_postgres_extension.yml
- import_playbook: 13.6_postgres_dns.yml
- import_playbook: 14_redis_setup.yml
- import_playbook: 15_opensrarch_setup.yml
