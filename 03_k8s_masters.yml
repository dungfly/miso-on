---
- name: Setup Kubernetes High Availability Masters
  hosts: masters
  become: yes
  vars:
    harbor_ip: "{{ hostvars[groups['harbor'][0]]['ansible_host'] }}"
    monitor_ip: "{{ hostvars[groups['monitoring'][0]]['ansible_host'] }}"
    k8s_version: "1.30"
    k8s_version_full: "v1.30.14"
    pause_version: "3.10.1"
    pod_cidr: "10.244.0.0/16"
    api_endpoint: "10.1.1.10" # HAProxy IP (6443 포트 중계용)

  tasks:
    # ---------------------------------------------------------------
    # STEP 1. 커널 및 네트워크 사전 준비
    # ---------------------------------------------------------------
    - name: 1. 커널 모듈 로드 (overlay, br_netfilter)
      ansible.builtin.command: modprobe {{ item }}
      loop:
        - overlay
        - br_netfilter
      changed_when: false

    - name: 2. 커널 모듈 부팅 시 자동 로드 설정
      ansible.builtin.copy:
        dest: /etc/modules-load.d/k8s.conf
        mode: "0644"
        content: |
          overlay
          br_netfilter

    - name: 3. sysctl 영구 설정 파일 배포
      ansible.builtin.copy:
        dest: /etc/sysctl.d/99-kubernetes-cri.conf
        mode: "0644"
        content: |
          net.bridge.bridge-nf-call-iptables = 1
          net.bridge.bridge-nf-call-ip6tables = 1
          net.ipv4.ip_forward = 1

    - name: 4. sysctl 적용
      ansible.builtin.command: sysctl --system
      changed_when: false

    # ---------------------------------------------------------------
    # STEP 2. Containerd 설치 및 설정
    # ---------------------------------------------------------------
    - name: 5. Docker 로컬 저장소 등록
      ansible.builtin.copy:
        dest: /etc/apt/sources.list.d/miso-local-docker.list
        mode: "0644"
        content: |
          deb [trusted=yes] http://{{ harbor_ip }}:8080/debs/docker ./

    - name: 6. K8s 로컬 저장소 확인 (A4에서 등록됐어야 함)
      ansible.builtin.stat:
        path: /etc/apt/sources.list.d/miso-local-k8s.list
      register: k8s_repo_check

    - name: 7. K8s 로컬 저장소 긴급 등록 (미등록 시)
      ansible.builtin.copy:
        dest: /etc/apt/sources.list.d/miso-local-k8s.list
        mode: "0644"
        content: |
          deb [trusted=yes] http://{{ harbor_ip }}:8080/debs/k8s ./
      when: not k8s_repo_check.stat.exists

    - name: 8. 외부 저장소 비활성화
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/apt/sources.list.d/docker.list
        - /etc/apt/sources.list.d/kubernetes.list

    - name: 9. Containerd 설치
      ansible.builtin.apt:
        name: containerd.io
        state: present
        update_cache: yes

    - name: 10. containerd 설정 디렉토리 생성
      ansible.builtin.file:
        path: /etc/containerd
        state: directory
        mode: "0755"

    - name: 11. Containerd config.toml 배포 (template)
      ansible.builtin.template:
        src: containerd_config.toml.j2
        dest: /etc/containerd/config.toml
        mode: "0644"

    - name: 12. Harbor /etc/hosts 등록
      ansible.builtin.lineinfile:
        path: /etc/hosts
        regexp: "harbor.{{ base_domain }}$"
        line: "{{ harbor_ip }} harbor.{{ base_domain }}"
        state: present

    - name: 16. Containerd 재시작 및 활성화
      ansible.builtin.systemd:
        name: containerd
        state: restarted
        enabled: yes
        daemon_reload: yes

    - name: 17. Containerd 소켓 준비 대기
      ansible.builtin.wait_for:
        path: /run/containerd/containerd.sock
        state: present
        timeout: 30

    - name: 18. Containerd CRI 응답 확인 (ctr 사용)
      ansible.builtin.shell: |
        set -e
        ctr version >/dev/null
      args:
        executable: /bin/bash
      register: cri_check
      retries: 10
      delay: 3
      until: cri_check.rc == 0
      changed_when: false

    - name: 19. Harbor pause 이미지 pull 테스트
      ansible.builtin.shell: |
        set -e
        ctr image pull --user '{{ harbor_robot_user }}:{{ harbor_robot_pass }}' {{ harbor_domain }}/{{ harbor_project }}/pause:{{ pause_version }}
      args:
        executable: /bin/bash
      register: pull_pause_test
      retries: 5
      delay: 3
      until: pull_pause_test.rc == 0
      changed_when: false

    - name: 20. Harbor kube-apiserver 이미지 pull 테스트
      ansible.builtin.shell: |
        set -e
        ctr image pull --user '{{ harbor_robot_user }}:{{ harbor_robot_pass }}' {{ harbor_domain }}/{{ harbor_project }}/kube-apiserver:{{ k8s_version_full }}
      args:
        executable: /bin/bash
      register: pull_apiserver_test
      retries: 5
      delay: 3
      until: pull_apiserver_test.rc == 0
      changed_when: false

    # ---------------------------------------------------------------
    # STEP 3. Kubernetes 패키지 설치
    # ---------------------------------------------------------------
    - name: 21. kubelet / kubeadm / kubectl 설치
      ansible.builtin.apt:
        name:
          - kubelet
          - kubeadm
          - kubectl
        state: present
        update_cache: yes

    - name: 22. kubelet / kubeadm / kubectl 버전 고정 (apt-mark hold)
      ansible.builtin.dpkg_selections:
        name: "{{ item }}"
        selection: hold
      loop:
        - kubelet
        - kubeadm
        - kubectl

    - name: 23. kubelet 활성화
      ansible.builtin.systemd:
        name: kubelet
        enabled: yes
        daemon_reload: yes

    # ---------------------------------------------------------------
    # STEP 4. 클러스터 초기화 (master1)
    # 실패 시 자동 로그 수집
    # ---------------------------------------------------------------
    - name: 24~26. kubeadm init + health check + 로그 수집 (master1 Only)
      when: inventory_hostname == 'master1'
      block:
        - name: 24. kubeadm init (master1 Only)
          ansible.builtin.command: >
            kubeadm init
            --pod-network-cidr={{ pod_cidr }}
            --control-plane-endpoint="{{ api_endpoint }}:6443"
            --upload-certs
            --image-repository {{ harbor_domain }}/{{ harbor_project }}
            --kubernetes-version={{ k8s_version_full }}
          args:
            creates: /etc/kubernetes/admin.conf
          register: kubeadm_init_result

        - name: 25. 로컬 API 서버 포트 기동 대기 (master1 Only)
          ansible.builtin.wait_for:
            host: 127.0.0.1
            port: 6443
            delay: 10
            timeout: 180

        - name: 26. API 서버 /healthz 정상 응답 대기 (master1 Only)
          ansible.builtin.uri:
            url: https://127.0.0.1:6443/healthz
            validate_certs: no
            status_code: 200
          register: healthz_result
          until: healthz_result.status == 200
          retries: 30
          delay: 10

      rescue:
        - name: 24-r1. kubelet 상태 수집
          ansible.builtin.shell: |
            systemctl status kubelet --no-pager || true
          args:
            executable: /bin/bash
          register: kubelet_status
          changed_when: false

        - name: 24-r2. kubelet journal 수집
          ansible.builtin.shell: |
            journalctl -xeu kubelet --no-pager | tail -n 250 || true
          args:
            executable: /bin/bash
          register: kubelet_journal
          changed_when: false

        - name: 24-r3. crictl ps 수집
          ansible.builtin.shell: |
            ctr containers list || true
          args:
            executable: /bin/bash
          register: crictl_ps
          changed_when: false

        - name: 24-r4. 모든 파드 목록 수집
          ansible.builtin.shell: |
            ctr tasks list || true
          args:
            executable: /bin/bash
          register: crictl_pods
          changed_when: false

        - name: 24-r5. kubelet 상태 출력
          ansible.builtin.debug:
            var: kubelet_status.stdout_lines

        - name: 24-r6. kubelet journal 출력
          ansible.builtin.debug:
            var: kubelet_journal.stdout_lines

        - name: 24-r7. crictl ps 출력
          ansible.builtin.debug:
            var: crictl_ps.stdout_lines

        - name: 24-r8. crictl pods 출력
          ansible.builtin.debug:
            var: crictl_pods.stdout_lines

        - name: 24-r9. kubeadm init 실패 종료
          ansible.builtin.fail:
            msg: "kubeadm init failed. 위 수집 로그를 확인하세요."

    # ---------------------------------------------------------------
    # STEP 4-b. bastion에서 kubectl용 kubeconfig 준비
    # ---------------------------------------------------------------
    - name: 27. master1 admin.conf를 bastion으로 fetch (master1 Only)
      ansible.builtin.fetch:
        src: /etc/kubernetes/admin.conf
        dest: /tmp/kubeconfig-admin.conf
        flat: yes
      register: adminconf_fetch
      when:
        - inventory_hostname == 'master1'
        - healthz_result is defined
        - healthz_result.status == 200

    - name: 28. bastion kubeconfig의 server를 HAProxy로 고정 (run_once)
      delegate_to: localhost
      run_once: true
      become: false
      ansible.builtin.shell: |
        set -e
        test -f /tmp/kubeconfig-admin.conf
        sed -i 's|server: https://.*:6443|server: https://{{ api_endpoint }}:6443|g' /tmp/kubeconfig-admin.conf
      args:
        executable: /bin/bash
      when:
        - hostvars['master1'].adminconf_fetch is defined
        - hostvars['master1'].adminconf_fetch is not failed

    - name: 29. bastion에서 kubectl client 확인 (run_once)
      delegate_to: localhost
      run_once: true
      become: false
      ansible.builtin.command: kubectl version --client=true
      when:
        - hostvars['master1'].adminconf_fetch is defined
        - hostvars['master1'].adminconf_fetch is not failed

    - name: 30. bastion kubeconfig로 노드 확인 (run_once)
      delegate_to: localhost
      run_once: true
      become: false
      environment:
        KUBECONFIG: /tmp/kubeconfig-admin.conf
      ansible.builtin.command: kubectl get nodes
      failed_when: false
      when:
        - hostvars['master1'].adminconf_fetch is defined
        - hostvars['master1'].adminconf_fetch is not failed

    # ---------------------------------------------------------------
    # STEP 5. 조인 정보 추출 (master1)
    # ---------------------------------------------------------------
    - name: 31. 조인 커맨드 추출 (master1 Only)
      ansible.builtin.shell: kubeadm token create --print-join-command
      environment:
        KUBECONFIG: /etc/kubernetes/admin.conf
      register: join_cmd
      when: inventory_hostname == 'master1'

    - name: 32. 인증서 키 추출 (master1 Only)
      ansible.builtin.shell: kubeadm init phase upload-certs --upload-certs | tail -n 1
      environment:
        KUBECONFIG: /etc/kubernetes/admin.conf
      register: cert_key
      when: inventory_hostname == 'master1'

    # ---------------------------------------------------------------
    # STEP 6. master2, 3 조인
    # ---------------------------------------------------------------
    - name: 33. 마스터 조인 (master2, 3)
      ansible.builtin.command: >
        {{ hostvars['master1']['join_cmd']['stdout'] }}
        --control-plane
        --certificate-key {{ hostvars['master1']['cert_key']['stdout'] }}
      when:
        - inventory_hostname in ['master2', 'master3']
        - hostvars['master1']['join_cmd'] is defined
        - hostvars['master1']['cert_key'] is defined
      args:
        creates: /etc/kubernetes/admin.conf

    # ---------------------------------------------------------------
    # STEP 7. CNI 설치 (bastion에서 실행)
    # ---------------------------------------------------------------
    - name: 34. tigera-operator manifest 다운로드 (bastion run_once)
      delegate_to: localhost
      run_once: true
      become: false
      ansible.builtin.shell: |
        set -e
        curl -fsSL -o /tmp/tigera-operator.yaml           http://{{ harbor_ip }}:8080/manifests/tigera-operator.yaml
      args:
        executable: /bin/bash
      when:
        - hostvars['master1'].adminconf_fetch is defined
        - hostvars['master1'].adminconf_fetch is not failed

    - name: 35. tigera-operator image를 Harbor 경로로 rewrite (bastion run_once)
      delegate_to: localhost
      run_once: true
      become: false
      ansible.builtin.shell: |
        set -e
        sed -i 's|quay.io/tigera/operator:v1.32.3|{{ harbor_domain }}/{{ harbor_project }}/tigera-operator:v1.32.3|g'           /tmp/tigera-operator.yaml
      args:
        executable: /bin/bash
      when:
        - hostvars['master1'].adminconf_fetch is defined
        - hostvars['master1'].adminconf_fetch is not failed

    - name: 36. API 서버 RBAC 안정화 대기
      delegate_to: localhost
      run_once: true
      become: false
      environment:
        KUBECONFIG: /tmp/kubeconfig-admin.conf
      ansible.builtin.shell: |
        for i in $(seq 1 20); do
          result=$(kubectl auth can-i patch customresourcedefinitions 2>/dev/null || true)
          if [ "$result" = "yes" ]; then
            echo "RBAC ready"
            exit 0
          fi
          echo "Waiting for RBAC... ($i/20)"
          sleep 5
        done
        echo "RBAC wait timeout - proceeding anyway"
        exit 0
      args:
        executable: /bin/bash
      when:
        - hostvars['master1'].adminconf_fetch is defined
        - hostvars['master1'].adminconf_fetch is not failed

    - name: 36-b. API 서버 openapi 엔드포인트 준비 대기
      delegate_to: localhost
      run_once: true
      become: false
      environment:
        KUBECONFIG: /tmp/kubeconfig-admin.conf
      ansible.builtin.shell: |
        for i in $(seq 1 30); do
          if kubectl api-resources >/dev/null 2>&1; then
            echo "API server openapi ready"
            exit 0
          fi
          echo "Waiting for API server openapi... ($i/30)"
          sleep 5
        done
        echo "Timeout waiting for openapi"
        exit 1
      args:
        executable: /bin/bash
      when:
        - hostvars['master1'].adminconf_fetch is defined
        - hostvars['master1'].adminconf_fetch is not failed

    - name: 37-pre. tigera-operator namespace 사전 생성
      delegate_to: localhost
      run_once: true
      become: false
      environment:
        KUBECONFIG: /tmp/kubeconfig-admin.conf
      ansible.builtin.shell: |
        kubectl get namespace tigera-operator >/dev/null 2>&1 || kubectl create namespace tigera-operator
      args:
        executable: /bin/bash
      changed_when: false
      when:
        - hostvars['master1'].adminconf_fetch is defined
        - hostvars['master1'].adminconf_fetch is not failed

    - name: 37. tigera-operator 설치 (bastion run_once)
      delegate_to: localhost
      run_once: true
      become: false
      environment:
        KUBECONFIG: /tmp/kubeconfig-admin.conf
      ansible.builtin.shell: |
        kubectl apply --server-side --force-conflicts -f /tmp/tigera-operator.yaml --validate=false
      args:
        executable: /bin/bash
      when:
        - hostvars['master1'].adminconf_fetch is defined
        - hostvars['master1'].adminconf_fetch is not failed

    - name: 38. tigera-operator Pod Ready 대기 (bastion run_once)
      delegate_to: localhost
      run_once: true
      become: false
      environment:
        KUBECONFIG: /tmp/kubeconfig-admin.conf
      ansible.builtin.shell: |
        kubectl -n tigera-operator rollout status deployment/tigera-operator --timeout=300s
      args:
        executable: /bin/bash
      retries: 5
      delay: 10
      register: tigera_wait
      until: tigera_wait.rc == 0
      changed_when: false
      when:
        - hostvars['master1'].adminconf_fetch is defined
        - hostvars['master1'].adminconf_fetch is not failed

    - name: 39. Installation CRD 등록 대기 (bastion run_once)
      delegate_to: localhost
      run_once: true
      become: false
      environment:
        KUBECONFIG: /tmp/kubeconfig-admin.conf
      ansible.builtin.shell: |
        kubectl get crd installations.operator.tigera.io
      args:
        executable: /bin/bash
      retries: 20
      delay: 10
      register: crd_wait
      until: crd_wait.rc == 0
      changed_when: false
      when:
        - hostvars['master1'].adminconf_fetch is defined
        - hostvars['master1'].adminconf_fetch is not failed

    - name: 40. Calico Installation CR 생성 (registry 방식, bastion run_once)
      delegate_to: localhost
      run_once: true
      become: false
      ansible.builtin.copy:
        dest: /tmp/custom-resources.yaml
        content: |
          apiVersion: operator.tigera.io/v1
          kind: Installation
          metadata:
            name: default
          spec:
            registry: {{ harbor_domain }}
            imagePath: {{ harbor_project }}
            imagePrefix: "calico-"
            calicoNetwork:
              ipPools:
              - blockSize: 26
                cidr: {{ pod_cidr }}
                encapsulation: VXLAN
                natOutgoing: Enabled
                nodeSelector: all()
          ---
          apiVersion: operator.tigera.io/v1
          kind: APIServer
          metadata:
            name: default
          spec: {}
      when:
        - hostvars['master1'].adminconf_fetch is defined
        - hostvars['master1'].adminconf_fetch is not failed

    - name: 41. Calico custom-resources 적용 (bastion run_once)
      delegate_to: localhost
      run_once: true
      become: false
      environment:
        KUBECONFIG: /tmp/kubeconfig-admin.conf
      ansible.builtin.shell: |
        kubectl apply -f /tmp/custom-resources.yaml --validate=false
      args:
        executable: /bin/bash
      when:
        - hostvars['master1'].adminconf_fetch is defined
        - hostvars['master1'].adminconf_fetch is not failed

    - name: 42. 노드/파드 상태 확인 (bastion run_once)
      delegate_to: localhost
      run_once: true
      become: false
      environment:
        KUBECONFIG: /tmp/kubeconfig-admin.conf
      ansible.builtin.shell: |
        kubectl get nodes -o wide
        kubectl get pods -A
      args:
        executable: /bin/bash
      register: verify_out
      changed_when: false
      when:
        - hostvars['master1'].adminconf_fetch is defined
        - hostvars['master1'].adminconf_fetch is not failed

    - name: 43. 최종 결과 출력
      ansible.builtin.debug:
        var: verify_out.stdout_lines
      delegate_to: localhost
      run_once: true
      when: verify_out is defined