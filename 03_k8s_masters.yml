---
- name: Setup Kubernetes High Availability Masters
  hosts: masters
  become: yes
  vars:
    harbor_ip: "{{ hostvars[groups['harbor'][0]]['ansible_host'] }}"
    monitor_ip: "{{ hostvars[groups['monitoring'][0]]['ansible_host'] }}"
    k8s_version: "1.30"
    pod_cidr: "10.244.0.0/16"
    api_endpoint: "10.1.1.10" # HAProxy IP (6443 포트 중계용)

  tasks:
    # ---------------------------------------------------------------
    # STEP 1. 커널 및 네트워크 사전 준비
    # ---------------------------------------------------------------
    - name: 1. 커널 모듈 로드 (overlay, br_netfilter)
      ansible.builtin.command: modprobe {{ item }}
      loop:
        - overlay
        - br_netfilter

    - name: 2. 커널 모듈 부팅 시 자동 로드 설정
      copy:
        dest: /etc/modules-load.d/k8s.conf
        content: |
          overlay
          br_netfilter

    - name: 3. sysctl 네트워크 설정 (Persistence 포함)
      ansible.builtin.command: sysctl -w {{ item.name }}={{ item.value }}
      loop:
        - { name: 'net.bridge.bridge-nf-call-iptables',  value: '1' }
        - { name: 'net.bridge.bridge-nf-call-ip6tables', value: '1' }
        - { name: 'net.ipv4.ip_forward',                 value: '1' }

    # ---------------------------------------------------------------
    # STEP 2. Containerd 설치 및 설정
    # ---------------------------------------------------------------
    - name: 4. Containerd 설치
      apt:
        name: containerd.io
        state: present
        update_cache: yes

    - name: "5. Containerd config.toml 배포 (template)"
      ansible.builtin.template:
        src: containerd_config.toml.j2
        dest: /etc/containerd/config.toml
        owner: root
        group: root
        mode: "0644"

    - name: 7. Containerd 즉시 재시작 및 활성화
      ansible.builtin.systemd:
        name: containerd
        state: restarted
        enabled: yes
        daemon_reload: yes

    - name: 8. Containerd 소켓 준비 대기
      wait_for:
        path: /run/containerd/containerd.sock
        state: present
        timeout: 30

    # ---------------------------------------------------------------
    # STEP 3. Kubernetes 패키지 설치
    # ---------------------------------------------------------------
    - name: 9. K8s 로컬 저장소 확인 (A4에서 등록됐어야 함)
      ansible.builtin.stat:
        path: /etc/apt/sources.list.d/miso-local-k8s.list
      register: k8s_repo_check

    - name: 10. K8s 로컬 저장소 긴급 등록 (미등록 시)
      ansible.builtin.copy:
        dest: /etc/apt/sources.list.d/miso-local-k8s.list
        content: |
          deb [trusted=yes] http://{{ harbor_ip }}:8080/debs/k8s ./
      when: not k8s_repo_check.stat.exists

    - name: 11. 외부 K8s 저장소 비활성화 (폐쇄망)
      ansible.builtin.file:
        path: /etc/apt/sources.list.d/kubernetes.list
        state: absent

    - name: 12. kubelet / kubeadm / kubectl 설치
      apt:
        name:
          - kubelet
          - kubeadm
          - kubectl
        state: present
        update_cache: yes

    - name: 13. kubelet / kubeadm / kubectl 버전 고정 (apt-mark hold)
      dpkg_selections:
        name: "{{ item }}"
        selection: hold
      loop:
        - kubelet
        - kubeadm
        - kubectl

    - name: 14. kubelet 활성화 (시작은 kubeadm init 후 자동)
      ansible.builtin.systemd:
        name: kubelet
        enabled: yes
        daemon_reload: yes

    # ---------------------------------------------------------------
    # STEP 4. 클러스터 초기화 (master1)
    # ---------------------------------------------------------------
    - name: 15. kubeadm init (master1 Only)
      command: >
        kubeadm init
        --pod-network-cidr={{ pod_cidr }}
        --control-plane-endpoint="{{ api_endpoint }}:6443"
        --upload-certs
        --image-repository {{ harbor_domain }}/{{ harbor_project }}
      when: inventory_hostname == 'master1'
      args:
        creates: /etc/kubernetes/admin.conf

    - name: 16. 로컬 API 서버 포트 기동 대기 (master1 Only)
      wait_for:
        host: 127.0.0.1
        port: 6443
        delay: 10
        timeout: 180
      when: inventory_hostname == 'master1'

    - name: 17. API 서버 /healthz 정상 응답 대기 (master1 Only)
      uri:
        url: https://127.0.0.1:6443/healthz
        validate_certs: no
        status_code: 200
      register: healthz_result
      until: healthz_result.status == 200
      retries: 30
      delay: 10
      when: inventory_hostname == 'master1'

    # ---------------------------------------------------------------
    # STEP 4-b. bastion에서 kubectl용 kubeconfig 준비
    # ---------------------------------------------------------------
    - name: 17-b. master1 admin.conf를 bastion으로 fetch (master1 Only)
      fetch:
        src: /etc/kubernetes/admin.conf
        dest: /tmp/kubeconfig-admin.conf
        flat: yes
      when: inventory_hostname == 'master1'

    - name: 17-c. bastion kubeconfig의 server를 HAProxy로 고정 (run_once)
      delegate_to: localhost
      run_once: true
      become: false
      shell: |
        set -e
        test -f /tmp/kubeconfig-admin.conf
        sed -i 's|server: https://.*:6443|server: https://{{ api_endpoint }}:6443|g' /tmp/kubeconfig-admin.conf

    - name: 17-d. bastion에서 kubectl client 확인 (run_once)
      delegate_to: localhost
      run_once: true
      become: false
      command: kubectl version --client=true

    - name: 17-e. bastion kubeconfig로 노드 확인 (run_once)
      delegate_to: localhost
      run_once: true
      become: false
      environment:
        KUBECONFIG: /tmp/kubeconfig-admin.conf
      command: kubectl get nodes
      failed_when: false

    # ---------------------------------------------------------------
    # STEP 5. 조인 정보 추출 (master1) - /etc/kubernetes/admin.conf 직접 사용
    # ---------------------------------------------------------------
    - name: 18-b. 조인 커맨드 추출 (master1 Only)
      shell: kubeadm token create --print-join-command
      environment:
        KUBECONFIG: /etc/kubernetes/admin.conf
      register: join_cmd
      when: inventory_hostname == 'master1'

    - name: 18-c. 인증서 키 추출 (master1 Only)
      shell: kubeadm init phase upload-certs --upload-certs | tail -n 1
      environment:
        KUBECONFIG: /etc/kubernetes/admin.conf
      register: cert_key
      when: inventory_hostname == 'master1'

    # ---------------------------------------------------------------
    # STEP 6. master2, 3 조인
    # ---------------------------------------------------------------
    - name: 20. 마스터 조인 (master2, 3)
      command: >
        {{ hostvars['master1']['join_cmd']['stdout'] }}
        --control-plane
        --certificate-key {{ hostvars['master1']['cert_key']['stdout'] }}
      when: inventory_hostname in ['master2', 'master3']
      args:
        creates: /etc/kubernetes/admin.conf

    # ---------------------------------------------------------------
    # STEP 7. CNI 설치 (bastion에서 실행)
    # - upstream registry mirror에 의존하지 않고
    # - Harbor에 수집된 오프라인 이미지 경로로 manifest rewrite 후 적용
    # ---------------------------------------------------------------
    - name: 21. tigera-operator manifest 다운로드 (bastion run_once)
      delegate_to: localhost
      run_once: true
      become: false
      shell: |
        set -e
        curl -fsSL -o /tmp/tigera-operator.yaml \
          http://{{ harbor_ip }}:8080/manifests/tigera-operator.yaml

    - name: 21-b. tigera-operator image를 Harbor 경로로 rewrite (bastion run_once)
      delegate_to: localhost
      run_once: true
      become: false
      shell: |
        set -e
        sed -i 's|quay.io/tigera/operator:v1.32.3|{{ harbor_domain }}/{{ harbor_project }}/tigera-operator:v1.32.3|g' \
          /tmp/tigera-operator.yaml

    - name: 21-c. tigera-operator 설치 (bastion run_once)
      delegate_to: localhost
      run_once: true
      become: false
      environment:
        KUBECONFIG: /tmp/kubeconfig-admin.conf
      shell: |
        kubectl apply --server-side --force-conflicts -f /tmp/tigera-operator.yaml --validate=false

    - name: 21-d. tigera-operator Pod Ready 대기 (bastion run_once)
      delegate_to: localhost
      run_once: true
      become: false
      environment:
        KUBECONFIG: /tmp/kubeconfig-admin.conf
      shell: |
        kubectl -n tigera-operator rollout status deployment/tigera-operator --timeout=300s
      retries: 5
      delay: 10
      register: tigera_wait
      until: tigera_wait.rc == 0
      changed_when: false

    - name: 21-e. Installation CRD 등록 대기 (bastion run_once)
      delegate_to: localhost
      run_once: true
      become: false
      environment:
        KUBECONFIG: /tmp/kubeconfig-admin.conf
      shell: |
        kubectl get crd installations.operator.tigera.io
      retries: 20
      delay: 10
      register: crd_wait
      until: crd_wait.rc == 0
      changed_when: false

    - name: 22. Calico Installation CR 생성 (registry 방식, bastion run_once)
      # tigera-operator의 Installation CR에 registry/imagePath/imagePrefix를 지정하면
      # operator가 모든 calico 이미지를 Harbor에서 자동으로 pull함.
      # 이미지 경로: {registry}/{imagePath}/{imagePrefix}{imageName}:{tag}
      # = harbor.miso.local / miso / calico- / node:v3.27.0
      # = harbor.miso.local/miso/calico-node:v3.27.0
      delegate_to: localhost
      run_once: true
      become: false
      ansible.builtin.copy:
        dest: /tmp/custom-resources.yaml
        content: |
          apiVersion: operator.tigera.io/v1
          kind: Installation
          metadata:
            name: default
          spec:
            registry: {{ harbor_domain }}
            imagePath: {{ harbor_project }}
            imagePrefix: "calico-"
            calicoNetwork:
              ipPools:
              - blockSize: 26
                cidr: {{ pod_cidr }}
                encapsulation: VXLAN
                natOutgoing: Enabled
                nodeSelector: all()
          ---
          apiVersion: operator.tigera.io/v1
          kind: APIServer
          metadata:
            name: default
          spec: {}

    - name: 22-c. Calico custom-resources 적용 (bastion run_once)
      delegate_to: localhost
      run_once: true
      become: false
      environment:
        KUBECONFIG: /tmp/kubeconfig-admin.conf
      shell: |
        kubectl apply -f /tmp/custom-resources.yaml --validate=false

    - name: 23. 노드/파드 상태 확인 (bastion run_once)
      delegate_to: localhost
      run_once: true
      become: false
      environment:
        KUBECONFIG: /tmp/kubeconfig-admin.conf
      shell: |
        kubectl get nodes -o wide
        kubectl get pods -A
      register: verify_out
      changed_when: false

    - debug:
        var: verify_out.stdout_lines
      delegate_to: localhost
      run_once: true
      when: verify_out is defined