# ~/hosts.ini
# =================================================================
# 네트워크 구성
#   10.1.1.x  - 인프라 (Bastion, LB)
#   10.1.2.x  - K8s Masters
#   10.1.3.x  - K8s Workers
#   10.1.4.x  - 데이터베이스 노드
#   10.1.5.x  - 부가 서비스 (Harbor, Monitoring)
#
# [그룹 설계]
#   db_nodes        : K8s 조인/튜닝 대상 (10_db_node_join, 11_db_node_tune)
#   postgres_nodes  : PostgreSQL nodeAffinity label 부착용
#   opensearch_nodes: OpenSearch nodeAffinity label 부착용
#   redis_nodes     : Redis nodeAffinity label 부착용
#
# [운영 환경 분리 가이드]
#   현재: 네 그룹이 동일 IP (10.1.4.x) 공유
#   분리: postgres/opensearch/redis 각 그룹에 별도 서버 IP 할당
#         → db_nodes 도 함께 업데이트 필요
#         → 플레이북 변경 없이 hosts.ini 만 수정하면 됨
# =================================================================

[bastion]
bastion1 ansible_host=10.1.1.50

[lb]
haproxy-main ansible_host=10.1.1.10

[masters]
master1 ansible_host=10.1.2.10
master2 ansible_host=10.1.2.20
master3 ansible_host=10.1.2.30

[workers]
worker1 ansible_host=10.1.3.10
worker2 ansible_host=10.1.3.20
worker3 ansible_host=10.1.3.30

# -----------------------------------------------------------------
# 데이터 노드
# ※ db_nodes      : K8s 조인/튜닝용 (children 미사용 - Jinja2 참조 안정성)
# ※ xxx_nodes     : 서비스별 nodeAffinity label 부착용
# ※ 서버 분리 시  : 각 그룹 IP를 변경하고 db_nodes 도 동일하게 업데이트
# -----------------------------------------------------------------

# K8s 조인 및 공통 튜닝 대상
[db_nodes]
db1 ansible_host=10.1.4.10
db2 ansible_host=10.1.4.20
db3 ansible_host=10.1.4.30

# PostgreSQL 전용 노드 (nodeAffinity: miso.local/role=postgres)
[postgres_nodes]
db1 ansible_host=10.1.4.10
db2 ansible_host=10.1.4.20
db3 ansible_host=10.1.4.30

# OpenSearch 전용 노드 (nodeAffinity: miso.local/role=opensearch)
[opensearch_nodes]
db1 ansible_host=10.1.4.10
db2 ansible_host=10.1.4.20
db3 ansible_host=10.1.4.30

# Redis 전용 노드 (nodeAffinity: miso.local/role=redis)
[redis_nodes]
db1 ansible_host=10.1.4.10
db2 ansible_host=10.1.4.20
db3 ansible_host=10.1.4.30

# -----------------------------------------------------------------
# 부가 서비스 (common_setup 제외 - 각 전용 플레이북에서 처리)
# -----------------------------------------------------------------
[harbor]
harbor1 ansible_host=10.1.5.10

[monitoring]
monitor1 ansible_host=10.1.6.100

# -----------------------------------------------------------------
# 그룹 묶음
# -----------------------------------------------------------------
[k8s:children]
masters
workers
db_nodes

[all:vars]
ansible_user=ubuntu
ansible_ssh_private_key_file=~/.ssh/miso-key.pem
ansible_ssh_common_args='-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'