---
# =================================================================
# 00_reset.yml - Kubernetes 클러스터 초기화
#
# 실행: ansible-playbook -i hosts.ini 00_reset.yml
#
# ※ 리셋 범위 선택 (기본: phase2만 리셋)
#
#   [phase2만 리셋] K8s 클러스터만 초기화 (기본값)
#     ansible-playbook -i hosts.ini 00_reset.yml
#
#   [phase2+3 리셋] K8s 클러스터 + DB 노드 조인 초기화
#     ansible-playbook -i hosts.ini 00_reset.yml -e reset_db=true
#
#   [전체 리셋] K8s + DB + 앱 데이터 전체 삭제 (PVC 포함)
#     ansible-playbook -i hosts.ini 00_reset.yml -e reset_db=true -e reset_data=true
#
# ※ 리셋 후 재실행 순서:
#     1. ansible-playbook -i hosts.ini phase2_k8s_cluster.yml
#     2. bash 04_get-kubeconfig_bastion.sh
#     3. ansible-playbook -i hosts.ini A3b_post_k8s_setup.yml
#     4. ansible-playbook -i hosts.ini phase3_db_nodes.yml  (reset_db=true 경우)
#
# ※ 리셋되지 않는 것:
#     - Harbor (이미지/매니페스트 보존)
#     - Bastion 설정 (kubectl, ansible, SSH 키)
#     - LB/HAProxy 설정
#     - OS 기본 설정 (01_common_setup 결과)
#     - containerd 설치 자체 (재설치 불필요)
# =================================================================

# -----------------------------------------------------------------
# [PLAY 1] Masters - kubeadm reset
# 리셋 범위: K8s control plane, etcd 데이터, CNI 설정
# -----------------------------------------------------------------
- name: "Masters kubeadm reset"
  hosts: masters
  become: yes
  gather_facts: false
  tasks:
    - name: "kubeadm reset (control plane + etcd 데이터 삭제)"
      ansible.builtin.shell: |
        kubeadm reset -f --ignore-preflight-errors=all
      ignore_errors: yes

    - name: "CNI 설정 디렉토리 삭제 (/etc/cni, /opt/cni)"
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/cni
        - /opt/cni
        - /var/lib/cni
        - /var/lib/calico

    - name: "K8s 설정 디렉토리 삭제"
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/kubernetes
        - /var/lib/kubelet
        - /var/lib/etcd
        - /root/.kube
        - /home/ubuntu/.kube

    - name: "iptables 규칙 초기화"
      ansible.builtin.shell: |
        iptables -F
        iptables -X
        iptables -t nat -F
        iptables -t nat -X
        iptables -t mangle -F
        iptables -t mangle -X
        ipvsadm --clear 2>/dev/null || true
      ignore_errors: yes

    - name: "containerd 재시작 (남은 컨테이너 정리)"
      ansible.builtin.systemd:
        name: containerd
        state: restarted

# -----------------------------------------------------------------
# [PLAY 2] Workers - kubeadm reset
# 리셋 범위: K8s worker 조인 설정, CNI, kubelet 데이터
# -----------------------------------------------------------------
- name: "Workers kubeadm reset"
  hosts: workers
  become: yes
  gather_facts: false
  tasks:
    - name: "kubeadm reset"
      ansible.builtin.shell: |
        kubeadm reset -f --ignore-preflight-errors=all
      ignore_errors: yes

    - name: "CNI 설정 디렉토리 삭제"
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/cni
        - /opt/cni
        - /var/lib/cni
        - /var/lib/calico

    - name: "K8s 설정 디렉토리 삭제"
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/kubernetes
        - /var/lib/kubelet
        - /root/.kube
        - /home/ubuntu/.kube

    - name: "iptables 규칙 초기화"
      ansible.builtin.shell: |
        iptables -F
        iptables -X
        iptables -t nat -F
        iptables -t nat -X
        iptables -t mangle -F
        iptables -t mangle -X
        ipvsadm --clear 2>/dev/null || true
      ignore_errors: yes

    - name: "containerd 재시작"
      ansible.builtin.systemd:
        name: containerd
        state: restarted

# -----------------------------------------------------------------
# [PLAY 3] DB Nodes - kubeadm reset (reset_db=true 일 때만)
# 리셋 범위: DB 노드의 K8s worker 조인 설정
# ※ DB 데이터(/data/postgres, /data/opensearch)는 보존
#    완전 삭제는 reset_data=true 추가
# -----------------------------------------------------------------
- name: "DB Nodes kubeadm reset (reset_db=true 시 실행)"
  hosts: db_nodes
  become: yes
  gather_facts: false
  tasks:
    - name: "kubeadm reset"
      ansible.builtin.shell: |
        kubeadm reset -f --ignore-preflight-errors=all
      ignore_errors: yes
      when: reset_db | default(false) | bool

    - name: "CNI 설정 디렉토리 삭제"
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/cni
        - /opt/cni
        - /var/lib/cni
      when: reset_db | default(false) | bool

    - name: "K8s 설정 디렉토리 삭제"
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/kubernetes
        - /var/lib/kubelet
      when: reset_db | default(false) | bool

    - name: "iptables 규칙 초기화"
      ansible.builtin.shell: |
        iptables -F
        iptables -X
        iptables -t nat -F
        iptables -t nat -X
      ignore_errors: yes
      when: reset_db | default(false) | bool

    - name: "containerd 재시작"
      ansible.builtin.systemd:
        name: containerd
        state: restarted
      when: reset_db | default(false) | bool

    # ※ reset_data=true: PVC 로컬 데이터까지 완전 삭제
    #    PostgreSQL, OpenSearch, Redis 데이터 모두 삭제됨
    #    복구 불가 - 신중하게 사용할 것
    - name: "로컬 PVC 데이터 삭제 (reset_data=true 시 실행)"
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /data/postgres
        - /data/opensearch
        - /opt/local-path-provisioner
      when: reset_data | default(false) | bool

# -----------------------------------------------------------------
# [PLAY 4] Workers - local-path PVC 데이터 삭제 (reset_data=true 시)
# 리셋 범위: MinIO, Redis PVC 로컬 데이터
# ※ 복구 불가 - 신중하게 사용할 것
# -----------------------------------------------------------------
- name: "Workers local-path PVC 데이터 삭제 (reset_data=true 시)"
  hosts: workers
  become: yes
  gather_facts: false
  tasks:
    # ※ reset_data=true: MinIO, Redis PVC 로컬 데이터 완전 삭제
    #    복구 불가 - 신중하게 사용할 것
    - name: "local-path-provisioner 데이터 삭제 (MinIO, Redis PVC)"
      ansible.builtin.file:
        path: /opt/local-path-provisioner
        state: absent
      when: reset_data | default(false) | bool

    - name: "MinIO 호스트 데이터 디렉토리 삭제"
      ansible.builtin.file:
        path: /data/minio
        state: absent
      when: reset_data | default(false) | bool

# -----------------------------------------------------------------
# [PLAY 5] Bastion - kubeconfig 및 임시파일 정리
# 리셋 범위: bastion의 kubeconfig, 임시 manifest 파일
# ※ ansible, kubectl, SSH 키는 보존
# -----------------------------------------------------------------
- name: "Bastion kubeconfig 및 임시파일 정리"
  hosts: bastion
  become: no
  gather_facts: false
  tasks:
    - name: "bastion kubeconfig 삭제"
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /home/ubuntu/.kube/config
        - /tmp/kubeconfig-admin.conf

    - name: "임시 manifest 파일 삭제"
      ansible.builtin.shell: |
        rm -f /tmp/*.yaml /tmp/*.conf
      ignore_errors: yes

    - name: "리셋 완료 안내"
      ansible.builtin.debug:
        msg:
          - "======================================================"
          - " 클러스터 리셋 완료"
          - "======================================================"
          - " 다음 단계:"
          - " 1. ansible-playbook -i hosts.ini phase2_k8s_cluster.yml"
          - " 2. bash 04_get-kubeconfig_bastion.sh"
          - " 3. ansible-playbook -i hosts.ini A3b_post_k8s_setup.yml"
          - ""
          - " DB 노드도 리셋한 경우:"
          - " 4. ansible-playbook -i hosts.ini phase3_db_nodes.yml"
          - "======================================================"