---
# reset은 다음을 '초기화'합니다:
# - kubeadm init / join 결과
# - /etc/kubernetes, /var/lib/kubelet, /var/lib/etcd
# - CNI 설정 및 네트워크 인터페이스(cni0, flannel.1)
# - kube-proxy / CNI 관련 iptables
# - bastion의 임시 kubeconfig
# - containerd 설정(config.toml, certs.d)
#
# reset은 다음을 '유지'합니다:
# - 01_common_setup 결과(기본 OS 패키지, 시간대, sysctl 기본값 등)
# - containerd / kubelet / kubeadm / kubectl 패키지 설치 자체
# - Harbor CA 파일 자체(필요 시 A3/03에서 다시 배포)
# - /etc/hosts 의 일반 항목
#
# 사용 목적:
# - phase2_k8s_cluster 재시도 전 깨끗한 상태 만들기
# - kubeadm init / control-plane join / worker join 실패 후 재시도

- name: Reset Kubernetes nodes and bastion artifacts
  hosts: masters:workers
  become: yes
  gather_facts: yes

  tasks:
    - name: 1. kubeadm reset
      ansible.builtin.shell: |
        kubeadm reset -f || true
      args:
        executable: /bin/bash
      changed_when: false

    - name: 2. kube 관련 디렉토리 삭제
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/kubernetes
        - /var/lib/kubelet
        - /etc/cni/net.d
        - /var/lib/cni
      ignore_errors: true

    - name: 3. masters only - etcd 데이터 삭제
      ansible.builtin.file:
        path: /var/lib/etcd
        state: absent
      when: "'masters' in group_names"
      ignore_errors: true

    - name: 4. containerd 설정 파일 삭제
      ansible.builtin.file:
        path: /etc/containerd/config.toml
        state: absent
      ignore_errors: true

    - name: 5. containerd certs.d 삭제
      ansible.builtin.file:
        path: /etc/containerd/certs.d
        state: absent
      ignore_errors: true

    - name: 6. kubelet 서비스 중지
      ansible.builtin.systemd:
        name: kubelet
        state: stopped
      ignore_errors: true

    - name: 7. containerd 서비스 재시작
      ansible.builtin.systemd:
        name: containerd
        state: restarted
        enabled: yes
        daemon_reload: yes
      ignore_errors: true

    - name: 8. cni/flannel 인터페이스 삭제
      ansible.builtin.shell: |
        ip link delete cni0 2>/dev/null || true
        ip link delete flannel.1 2>/dev/null || true
      args:
        executable: /bin/bash
      changed_when: false

    - name: 9. kube-proxy / CNI 관련 iptables 정리
      ansible.builtin.shell: |
        iptables -F || true
        iptables -t nat -F || true
        iptables -t mangle -F || true
        iptables -X || true
        ip6tables -F || true
        ip6tables -t nat -F || true
        ip6tables -t mangle -F || true
        ip6tables -X || true
      args:
        executable: /bin/bash
      changed_when: false

    - name: 10. kubelet 서비스 재활성화 (시작은 phase2에서 진행)
      ansible.builtin.systemd:
        name: kubelet
        enabled: yes
        daemon_reload: yes
      ignore_errors: true

    - name: 11. reset 후 상태 확인
      ansible.builtin.shell: |
        echo "=== hostname ==="
        hostname
        echo "=== kubelet ==="
        systemctl is-enabled kubelet 2>/dev/null || true
        echo "=== containerd ==="
        systemctl is-active containerd 2>/dev/null || true
        echo "=== leftover manifests ==="
        ls -al /etc/kubernetes/manifests 2>/dev/null || true
        echo "=== leftover certs.d ==="
        ls -al /etc/containerd/certs.d 2>/dev/null || true
      args:
        executable: /bin/bash
      register: reset_status
      changed_when: false

    - name: 12. reset 상태 출력
      ansible.builtin.debug:
        var: reset_status.stdout_lines

- name: Reset bastion-side kubeconfig artifacts
  hosts: bastion
  become: yes
  gather_facts: yes

  tasks:
    - name: 1. bastion 임시 kubeconfig 삭제
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /tmp/kubeconfig-admin.conf
        - /home/ubuntu/.kube/config
      ignore_errors: true

    - name: 2. .kube 디렉토리 생성
      ansible.builtin.file:
        path: /home/ubuntu/.kube
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: "0700"

    - name: 3. bastion reset 결과 출력
      ansible.builtin.shell: |
        echo "=== bastion kube artifacts ==="
        ls -al /tmp/kubeconfig-admin.conf 2>/dev/null || true
        ls -al /home/ubuntu/.kube 2>/dev/null || true
      args:
        executable: /bin/bash
      register: bastion_reset_status
      changed_when: false

    - name: 4. bastion reset 상태 출력
      ansible.builtin.debug:
        var: bastion_reset_status.stdout_lines
