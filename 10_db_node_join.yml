---
- name: Install Kubernetes runtime + tools on DB nodes (as worker)
  hosts: db_nodes
  become: yes
  tasks:
    - name: Load kernel modules for Kubernetes
      community.general.modprobe:
        name: "{{ item }}"
        state: present
      loop:
        - overlay
        - br_netfilter

    - name: Set sysctl params
      ansible.posix.sysctl:
        name: "{{ item.key }}"
        value: "{{ item.value }}"
        state: present
        reload: yes
      loop:
        - { key: 'net.bridge.bridge-nf-call-iptables', value: '1' }
        - { key: 'net.bridge.bridge-nf-call-ip6tables', value: '1' }
        - { key: 'net.ipv4.ip_forward', value: '1' }

    - name: Install containerd
      ansible.builtin.apt:
        name: containerd.io
        state: present
        update_cache: yes

    - name: "5. Containerd config.toml 배포 (template)"
      ansible.builtin.template:
        src: containerd_config.toml.j2
        dest: /etc/containerd/config.toml
        owner: root
        group: root
        mode: "0644"
    - name: Restart containerd
      ansible.builtin.systemd:
        name: containerd
        state: restarted
        enabled: yes
        daemon_reload: yes

    - name: "K8s 로컬 저장소 등록 (폐쇄망)"
      ansible.builtin.copy:
        dest: /etc/apt/sources.list.d/miso-local-k8s.list
        mode: '0644'
        content: |
          deb [trusted=yes] http://{{ hostvars[groups['harbor'][0]]['ansible_host'] }}:8080/debs/k8s ./

    - name: "외부 K8s 저장소 비활성화"
      ansible.builtin.file:
        path: /etc/apt/sources.list.d/kubernetes.list
        state: absent

    - name: Install kubelet/kubeadm/kubectl
      ansible.builtin.apt:
        name:
          - kubelet
          - kubeadm
          - kubectl
        state: present
        update_cache: yes

    - name: Hold kube packages
      ansible.builtin.dpkg_selections:
        name: "{{ item }}"
        selection: hold
      loop: [kubelet, kubeadm, kubectl]

  handlers: []

# ------------------------------------------------------------------

- name: Get kubeadm join command from control plane
  hosts: masters[0]
  become: yes
  gather_facts: false
  tasks:
    - name: Generate join command (token + discovery hash)
      ansible.builtin.command: kubeadm token create --print-join-command
      register: join_cmd
      changed_when: false

    - name: Save join command for other plays
      ansible.builtin.set_fact:
        kubeadm_join_cmd: "{{ join_cmd.stdout }}"

# ------------------------------------------------------------------

- name: Join DB nodes
  hosts: db_nodes
  become: yes
  gather_facts: false
  tasks:
    - name: Join node if not already joined
      ansible.builtin.shell: |
        set -e
        if [ -f /etc/kubernetes/kubelet.conf ]; then
          echo "Already joined - skip"
          exit 0
        fi
        {{ hostvars[groups['masters'][0]].kubeadm_join_cmd }} --ignore-preflight-errors=all

# ------------------------------------------------------------------

- name: Label/Taint DB nodes (by InternalIP)
  hosts: bastion
  become: no
  gather_facts: false
  tasks:
    - name: Wait until DB nodes appear in cluster (by InternalIP)
      ansible.builtin.shell: |
        set -e
        for ip in {% for h in groups['db_nodes'] %}{{ hostvars[h].ansible_host }}{% if not loop.last %} {% endif %}{% endfor %}; do
          kubectl get nodes -o wide | awk -v ip="$ip" '$6==ip {found=1} END{exit !found}'
        done
      register: node_wait
      retries: 60
      delay: 5
      until: node_wait.rc == 0
      changed_when: false

    - name: Label/Taint DB nodes (by InternalIP)
      ansible.builtin.shell: |
        set -e
        for ip in {% for h in groups['db_nodes'] %}{{ hostvars[h].ansible_host }}{% if not loop.last %} {% endif %}{% endfor %}; do
          node="$(kubectl get nodes -o wide | awk -v ip="$ip" '$6==ip {print $1; exit}')"
          echo "ip=$ip -> node=$node"
          kubectl label node "$node" node-role.kubernetes.io/db=true --overwrite
          kubectl taint node "$node" dedicated=db:NoSchedule --overwrite
        done
      changed_when: true

    - name: Show nodes
      ansible.builtin.command: kubectl get nodes -o wide
      register: nodes_out
      changed_when: false

    - name: Print nodes
      ansible.builtin.debug:
        msg: "{{ nodes_out.stdout_lines }}"