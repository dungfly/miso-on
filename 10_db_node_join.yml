---
- name: Install Kubernetes runtime + tools on DB nodes (as worker)
  hosts: db_nodes
  become: yes
  tasks:
    - name: Load kernel modules for Kubernetes
      community.general.modprobe:
        name: "{{ item }}"
        state: present
      loop:
        - overlay
        - br_netfilter

    - name: Set sysctl params
      ansible.posix.sysctl:
        name: "{{ item.key }}"
        value: "{{ item.value }}"
        state: present
        reload: yes
      loop:
        - { key: 'net.bridge.bridge-nf-call-iptables', value: '1' }
        - { key: 'net.bridge.bridge-nf-call-ip6tables', value: '1' }
        - { key: 'net.ipv4.ip_forward', value: '1' }

    - name: Install containerd
      ansible.builtin.apt:
        name: containerd
        state: present
        update_cache: yes

    - name: Generate containerd config and enable systemd cgroup
      ansible.builtin.shell: |
        set -e
        mkdir -p /etc/containerd
        containerd config default > /etc/containerd/config.toml
        sed -i 's/SystemdCgroup = false/SystemdCgroup = true/g' /etc/containerd/config.toml
      args:
        creates: /etc/containerd/config.toml

    - name: "containerd sandbox_image를 Harbor pause:3.9로 변경"
      ansible.builtin.replace:
        path: /etc/containerd/config.toml
        regexp: 'sandbox_image = ".*"'
        replace: 'sandbox_image = "{{ harbor_domain }}/{{ harbor_project }}/pause:3.9"'

    - name: "Harbor /etc/hosts 등록"
      ansible.builtin.lineinfile:
        path: /etc/hosts
        regexp: "harbor\\.{{ base_domain }}$"
        line: "{{ hostvars[groups['harbor'][0]]['ansible_host'] }} harbor.{{ base_domain }}"
        state: present

    - name: "Harbor mirror hosts.toml 디렉토리 생성"
      ansible.builtin.file:
        path: /etc/containerd/certs.d/{{ harbor_domain }}
        state: directory
        mode: "0755"

    - name: "Harbor mirror hosts.toml 설정 (인증 포함)"
      ansible.builtin.copy:
        dest: /etc/containerd/certs.d/{{ harbor_domain }}/hosts.toml
        mode: "0600"
        content: |
          server = "https://{{ harbor_domain }}"
          [host."https://{{ harbor_domain }}"]
            capabilities = ["pull", "resolve"]
            skip_verify = true
          [host."https://{{ harbor_domain }}".header]
            Authorization = ["Basic {{ (harbor_robot_user + ':' + harbor_robot_pass) | b64encode }}"]

    - name: "registry.k8s.io mirror 디렉토리 생성"
      ansible.builtin.file:
        path: /etc/containerd/certs.d/registry.k8s.io
        state: directory
        mode: "0755"

    - name: "registry.k8s.io → Harbor mirror 설정"
      ansible.builtin.copy:
        dest: /etc/containerd/certs.d/registry.k8s.io/hosts.toml
        mode: "0644"
        content: |
          server = "https://registry.k8s.io"
          [host."https://{{ harbor_domain }}"]
            capabilities = ["pull", "resolve"]
            skip_verify = true
          [host."https://{{ harbor_domain }}".header]
            Authorization = ["Basic {{ (harbor_robot_user + ':' + harbor_robot_pass) | b64encode }}"]

    - name: "docker.io mirror 디렉토리 생성"
      ansible.builtin.file:
        path: /etc/containerd/certs.d/docker.io
        state: directory
        mode: "0755"

    - name: "docker.io → Harbor mirror 설정"
      ansible.builtin.copy:
        dest: /etc/containerd/certs.d/docker.io/hosts.toml
        mode: "0644"
        content: |
          server = "https://docker.io"
          [host."https://{{ harbor_domain }}"]
            capabilities = ["pull", "resolve"]
            skip_verify = true
          [host."https://{{ harbor_domain }}".header]
            Authorization = ["Basic {{ (harbor_robot_user + ':' + harbor_robot_pass) | b64encode }}"]

    - name: "quay.io mirror 디렉토리 생성"
      ansible.builtin.file:
        path: /etc/containerd/certs.d/quay.io
        state: directory
        mode: "0755"

    - name: "quay.io → Harbor mirror 설정"
      ansible.builtin.copy:
        dest: /etc/containerd/certs.d/quay.io/hosts.toml
        mode: "0644"
        content: |
          server = "https://quay.io"
          [host."https://{{ harbor_domain }}"]
            capabilities = ["pull", "resolve"]
            skip_verify = true
          [host."https://{{ harbor_domain }}".header]
            Authorization = ["Basic {{ (harbor_robot_user + ':' + harbor_robot_pass) | b64encode }}"]

    - name: "containerd config_path 설정 (hosts.toml 활성화)"
      ansible.builtin.replace:
        path: /etc/containerd/config.toml
        regexp: 'config_path = ""'
        replace: 'config_path = "/etc/containerd/certs.d"'

    - name: Restart containerd
      ansible.builtin.systemd:
        name: containerd
        state: restarted
        enabled: yes
        daemon_reload: yes

    - name: "K8s 로컬 저장소 등록 (폐쇄망)"
      ansible.builtin.copy:
        dest: /etc/apt/sources.list.d/miso-local-k8s.list
        mode: '0644'
        content: |
          deb [trusted=yes] http://{{ hostvars[groups['harbor'][0]]['ansible_host'] }}:8080/debs/k8s ./

    - name: "외부 K8s 저장소 비활성화"
      ansible.builtin.file:
        path: /etc/apt/sources.list.d/kubernetes.list
        state: absent

    - name: Install kubelet/kubeadm/kubectl
      ansible.builtin.apt:
        name:
          - kubelet
          - kubeadm
          - kubectl
        state: present
        update_cache: yes

    - name: Hold kube packages
      ansible.builtin.dpkg_selections:
        name: "{{ item }}"
        selection: hold
      loop: [kubelet, kubeadm, kubectl]

  handlers: []

# ------------------------------------------------------------------

- name: Get kubeadm join command from control plane
  hosts: masters[0]
  become: yes
  gather_facts: false
  tasks:
    - name: Generate join command (token + discovery hash)
      ansible.builtin.command: kubeadm token create --print-join-command
      register: join_cmd
      changed_when: false

    - name: Save join command for other plays
      ansible.builtin.set_fact:
        kubeadm_join_cmd: "{{ join_cmd.stdout }}"

# ------------------------------------------------------------------

- name: Join DB nodes
  hosts: db_nodes
  become: yes
  gather_facts: false
  tasks:
    - name: Join node if not already joined
      ansible.builtin.shell: |
        set -e
        if [ -f /etc/kubernetes/kubelet.conf ]; then
          echo "Already joined - skip"
          exit 0
        fi
        {{ hostvars[groups['masters'][0]].kubeadm_join_cmd }} --ignore-preflight-errors=all

# ------------------------------------------------------------------

- name: Label/Taint DB nodes (by InternalIP)
  hosts: bastion
  become: no
  gather_facts: false
  tasks:
    - name: Wait until DB nodes appear in cluster (by InternalIP)
      ansible.builtin.shell: |
        set -e
        for ip in {% for h in groups['db_nodes'] %}{{ hostvars[h].ansible_host }}{% if not loop.last %} {% endif %}{% endfor %}; do
          kubectl get nodes -o wide | awk -v ip="$ip" '$6==ip {found=1} END{exit !found}'
        done
      register: node_wait
      retries: 60
      delay: 5
      until: node_wait.rc == 0
      changed_when: false

    - name: Label/Taint DB nodes (by InternalIP)
      ansible.builtin.shell: |
        set -e
        for ip in {% for h in groups['db_nodes'] %}{{ hostvars[h].ansible_host }}{% if not loop.last %} {% endif %}{% endfor %}; do
          node="$(kubectl get nodes -o wide | awk -v ip="$ip" '$6==ip {print $1; exit}')"
          echo "ip=$ip -> node=$node"
          kubectl label node "$node" node-role.kubernetes.io/db=true --overwrite
          kubectl taint node "$node" dedicated=db:NoSchedule --overwrite
        done
      changed_when: true

    - name: Show nodes
      ansible.builtin.command: kubectl get nodes -o wide
      register: nodes_out
      changed_when: false

    - name: Print nodes
      ansible.builtin.debug:
        msg: "{{ nodes_out.stdout_lines }}"