---
- name: Setup HAProxy for K8s API + Ingress
  hosts: lb
  become: yes

  vars:
    # Ingress NodePort (ingress-nginx 서비스에서 확인한 값)
    ingress_http_nodeport: 30080
    ingress_https_nodeport: 30443

    # 워커 노드 IP (실제 환경에 맞게 수정)
    worker_nodes:
      - { name: 'worker1', ip: '10.1.3.10' }
      - { name: 'worker2', ip: '10.1.3.20' }
      - { name: 'worker3', ip: '10.1.3.30' }

    # 마스터 노드 IP (실제 환경에 맞게 수정)
    master_nodes:
      - { name: 'master1', ip: '10.1.2.10' }
      - { name: 'master2', ip: '10.1.2.20' }
      - { name: 'master3', ip: '10.1.2.30' }

    # VIP로 바인드하고 싶으면 true (VIP가 LB에 실제로 올라가 있어야 함)
    bind_vip: true
    vip_ip: "10.1.1.10"

    # Grafana VM (SNI 라우팅용)
    monitor_ip: "10.1.5.100"

  tasks:
    - name: 1. Install HAProxy
      ansible.builtin.apt:
        name: haproxy
        state: present
        update_cache: yes

    - name: 2. Backup existing haproxy.cfg (if exists)
      ansible.builtin.copy:
        src: /etc/haproxy/haproxy.cfg
        dest: /etc/haproxy/haproxy.cfg.bak
        remote_src: yes
      ignore_errors: yes

    - name: 3. Deploy haproxy.cfg from template
      ansible.builtin.template:
        src: haproxy.cfg.j2
        dest: /etc/haproxy/haproxy.cfg
        mode: "0644"
      notify: Restart HAProxy

    - name: 4. Validate HAProxy config
      ansible.builtin.command: haproxy -c -f /etc/haproxy/haproxy.cfg
      changed_when: false

  handlers:
    - name: Restart HAProxy
      ansible.builtin.service:
        name: haproxy
        state: restarted
        enabled: yes