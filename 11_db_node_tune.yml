---
- name: "DB 및 OpenSearch 전용 노드 시스템 튜닝"
  hosts: db_nodes
  become: yes
  tasks:
    - name: "OpenSearch용 vm.max_map_count 설정"
      ansible.builtin.command: sysctl -w vm.max_map_count="262144"

    - name: "파일/프로세스 제한 설정 (nofile/nproc)"
      ansible.builtin.copy:
        dest: /etc/security/limits.d/db_limits.conf
        mode: "0644"
        content: |
          * soft nofile 65536
          * hard nofile 65536
          * soft nproc 4096
          * hard nproc 4096

    - name: "데이터 저장 폴더 생성 (Postgres/OpenSearch)"
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: directory
        owner: "{{ item.owner }}"
        group: "{{ item.owner }}"
        mode: "{{ item.mode }}"
      loop:
        - { path: "/data/postgres", owner: "999",  mode: "0700" }
        - { path: "/data/opensearch", owner: "1000", mode: "0755" }

    - name: "설정 확인 (vm.max_map_count)"
      ansible.builtin.command: sysctl -n vm.max_map_count
      register: map_count
      changed_when: false

    - name: "결과 출력"
      ansible.builtin.debug:
        msg:
          - "vm.max_map_count={{ map_count.stdout }}"
          - "Created: /data/postgres (owner 999), /data/opensearch (owner 1000)"